<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>日程確定(アポ確定)</title>
</head>
<body>

<h3>日程確定(アポ確定)</h3>
<hr>
<button type="button" id="clearBtn">クリア</button><br>

<textarea id="lineName" rows="2" cols="25" placeholder="LINE名" style="background-color:#fff9c4;"></textarea>
<button type="button" id="lineNameCopyBtn">コピー</button><br>

<textarea id="meetingDate" rows="2" cols="25" placeholder="面談日時" style="background-color:#e8f5e9;"></textarea><br>

<p style="font-size:12px; font-weight:bold;">流入経路：</p>
<div id="entryContainer"></div>

<hr>

<section style="font-size:12px; line-height:1.6;">
  <p style="font-weight:bold;">各種入力</p>
  <ul>
    <li>
      <span style="color:blue; font-weight:bold; font-size:18px;">クローザー日程</span><br>
      <span style="color:gray;">担当クローザー：</span><br>
      <div id="closerContainer"></div>
      <input type="hidden" id="hiddenZoomUrl">
    </li>
    <li>
      <span style="color:blue; font-weight:bold; font-size:18px;">Googleカレンダー</span><br>
      <textarea id="calendarTitle" rows="3" cols="30"></textarea>
      <button type="button" id="calendarCopyBtn">コピー</button>
    </li>
  </ul>

  <hr>

  <p style="font-weight:bold;">UTAGE画面</p>
  <ul>
    <li>
      <span style="color:#B22222; font-weight:bold; font-size:18px;"> Zoomリンク送信</span><br>
      <textarea id="zoomMessageArea" rows="18" cols="30"></textarea>
      <button id="zoomCopyBtn">コピー</button>
    </li>
    <li>
      <span style="color:#B22222; font-weight:bold; font-size:18px;">雑談スタート</span><br>
      <textarea id="chatQuestionArea" rows="5" cols="30"></textarea>
      <button id="chatCopyBtn">コピー</button>
    </li>
  </ul>
</section>

<script type="module">
import { initCloserSelect } from './closer-select.js';
import { initEntrySelect } from './entry-select.js';

// --- 要素の取得 ---
const el = {
  lineName:      document.getElementById("lineName"),
  meetingDate:   document.getElementById("meetingDate"),
  entryBox:      document.getElementById("entryContainer"),
  closerBox:     document.getElementById("closerContainer"),
  hiddenZoom:    document.getElementById("hiddenZoomUrl"),
  calendarTitle: document.getElementById("calendarTitle"),
  zoomMessage:   document.getElementById("zoomMessageArea"),
  chatQuestion:  document.getElementById("chatQuestionArea")
};

// --- ロジック ---

// 全リセット
const resetFields = () => {
  const entrySelect  = el.entryBox.querySelector('select');
  const closerSelect = el.closerBox.querySelector('select');

  if (entrySelect)  entrySelect.value = "";
  if (closerSelect) {
    closerSelect.value = "";
    closerSelect.style.backgroundColor = "#ffffff";
  }

  el.calendarTitle.value = "";
  el.hiddenZoom.value    = "";
  el.zoomMessage.value   = "";
  el.chatQuestion.value  = "";
  el.meetingDate.value   = "";
};

// カレンダータイトル更新
const refreshCalendarTitle = () => {
  const name = el.lineName.value.trim();
  const entrySelect = el.entryBox.querySelector('select');
  const media = entrySelect?.value || "";

  el.calendarTitle.value = (name && media) ? `${media}${name}` : "";
};

// Zoomメッセージ更新
const refreshZoomMessage = () => {
  if (!el.hiddenZoom.value) return;

  if (!el.lineName.value || !el.meetingDate.value) {
    alert("LINE名と面談日時は必須です");
    resetFields();
    return;
  }

  el.zoomMessage.value = `実施日：${el.meetingDate.value}\n\n${el.hiddenZoom.value}\n\n【無料プレゼントはこちら👇】\nhttps://forms.gle/i2XPWLVQE44iYc7b8`;
};

// --- イベント設定 ---

// LINE名入力時
el.lineName.oninput = () => {
  resetFields();
  el.chatQuestion.value = el.lineName.value ? `${el.lineName.value}さんはこれまで副業やったことありますか？` : "";
};

// クリアボタン
document.getElementById("clearBtn").onclick = () => {
  el.lineName.value = "";
  resetFields();
};

// コピー機能一括
const setupCopy = (btnId, targetEl) => {
  document.getElementById(btnId).onclick = () => {
    if (!targetEl.value) return;
    targetEl.select();
    document.execCommand("copy");
  };
};
setupCopy("lineNameCopyBtn", el.lineName);
setupCopy("calendarCopyBtn", el.calendarTitle);
setupCopy("zoomCopyBtn",     el.zoomMessage);
setupCopy("chatCopyBtn",     el.chatQuestion);

// --- 外部コンポーネント初期化 ---
// 呼び出しを整理：(挿入先ID, [連動InputID], コールバック)
initEntrySelect(el.entryBox.id, refreshCalendarTitle);
initCloserSelect(el.closerBox.id, el.hiddenZoom.id, refreshZoomMessage);

</script>
</body>
</html>
