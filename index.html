<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>日程確定(最強アシスタント)</title>
<style>
    body { font-family: "Helvetica Neue", Arial, sans-serif; background: #f4f7f6; padding: 20px; color: #333; max-width: 500px; margin: 0 auto; }
    .step-box { background: #fff; border-radius: 8px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 5px solid #ccc; transition: 0.3s; }
    .step-active { border-left-color: #2196F3; transform: scale(1.02); }
    .step-disabled { opacity: 0.4; pointer-events: none; filter: grayscale(1); }
    .step-done { border-left-color: #4CAF50; background: #f9fff9; }

    .step-num { background: #333; color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 11px; margin-right: 5px; vertical-align: middle; }
    .title-blue { color: #0d47a1; font-weight: bold; font-size: 16px; }
    .title-red { color: #b71c1c; font-weight: bold; font-size: 16px; }
    
    textarea { width: 100%; margin: 8px 0; border: 1px solid #ddd; border-radius: 4px; padding: 8px; box-sizing: border-box; font-size: 14px; }
    button { width: 100%; padding: 10px; cursor: pointer; border: none; border-radius: 4px; background: #2196F3; color: white; font-weight: bold; transition: 0.2s; }
    button:hover { background: #1976D2; }
    button:active { transform: translateY(2px); }
    .copy-done { background: #4CAF50 !important; }

    .remind-simple { display: inline-block; background:#e0f0ff; color:#004a99; font-weight:bold; padding:6px 12px; border-radius:4px; animation: blink 1s infinite; margin-top:10px; width: 100%; text-align: center; box-sizing: border-box; }
    @keyframes blink { 50% { opacity: 0.4; } }
    
    .badge { font-weight: bold; background-color: #fff9c4; padding: 2px 6px; border: 1px solid #fbc02d; border-radius: 4px; display: inline-block; margin: 4px 0; }
</style>
</head>
<body>

<h2 style="text-align:center; font-size:18px;">日程確定アシスタント</h2>
<button id="clearBtn" style="background:#666; margin-bottom:20px;">全データをリセットして最初から</button>

<div id="box-lineName" class="step-box step-active">
    <span class="step-num">1</span> <span class="title-blue">LINE名を入力</span>
    <textarea id="lineName" rows="2" placeholder="お客様のLINE名を入力してください" style="background:#fff9c4;"></textarea>
    <button class="copy-trigger" data-target="lineName">LINE名をコピー</button>
</div>

<div id="box-info" class="step-box step-disabled">
    <span class="step-num">2</span> <span class="title-blue">面談情報の設定</span>
    <textarea id="meetingDate" rows="2" placeholder="面談日時（例：3/20 15:00〜）" style="background:#e8f5e9;"></textarea>
    <p style="font-size:11px; font-weight:bold; margin:10px 0 5px;">流入経路を選択：</p>
    <div id="entry-container"></div>
</div>

<div id="box-closer" class="step-box step-disabled">
    <span class="step-num">3</span> <span class="title-blue">担当者の決定</span>
    <div id="closer-list"></div>
    <div style="margin-top:15px;">
        <span class="sub-text" style="font-size:11px; color:gray;">カレンダータイトル：</span>
        <textarea id="calendarTitle" rows="2"></textarea>
        <button class="copy-trigger" data-target="calendarTitle">カレンダー名をコピー</button>
        <span class="remind-simple">メール送信を忘れずに！</span>
    </div>
</div>

<div id="box-utage" class="step-box step-disabled">
    <span class="step-num">4</span> <span class="title-red">UTAGEラベル・送信</span>
    <p style="margin:0 0 10px; font-size:11px;">以下の順にラベルを貼ってください：</p>
    <span class="badge">⭕日程確定（普通導線）</span><br>
    <span id="closer-label-display" class="badge">（クローザー）担当者名</span>
    
    <div style="margin-top:15px;">
        <span class="title-red" style="font-size:14px;">Zoomリンクメッセージ</span>
        <textarea id="output" rows="10"></textarea>
        <button class="copy-trigger" data-target="output">メッセージをコピー</button>
    </div>

    <div style="margin-top:15px;">
        <span class="title-red" style="font-size:14px;">雑談用質問</span>
        <textarea id="extraQuestion" rows="3"></textarea>
        <button class="copy-trigger" data-target="extraQuestion">質問をコピー</button>
    </div>
</div>

<script type="module">
    import { initCloserSelect } from './closer-select.js';
    import { initEntrySelect } from './entry-select.js';

    const $ = id => document.getElementById(id);
    const getSelect = id => document.querySelector(`#${id} select`);

    // 視覚的ロック制御
    function refreshFlow() {
        const name = $('lineName').value.trim();
        const date = $('meetingDate').value.trim();
        const entry = getSelect('entry-container')?.value;
        const staff = getSelect('closer-list');
        const zoom = staff?.value;

        // STEP 1完了判定
        if (name) {
            $('box-lineName').className = 'step-box step-done';
            $('box-info').classList.remove('step-disabled');
            $('box-info').classList.add('step-active');
        } else {
            $('box-info').className = 'step-box step-disabled';
        }

        // STEP 2完了判定
        if (name && date && entry) {
            $('box-info').className = 'step-box step-done';
            $('box-closer').classList.remove('step-disabled');
            $('box-closer').classList.add('step-active');
        } else {
            $('box-closer').className = 'step-box step-disabled';
        }

        // STEP 3完了判定
        if (name && date && entry && zoom) {
            $('box-closer').className = 'step-box step-done';
            $('box-utage').classList.remove('step-disabled');
            $('box-utage').classList.add('step-active');
        } else {
            $('box-utage').className = 'step-box step-disabled';
        }

        // ロジック更新
        const sName = (staff && staff.selectedIndex > 0) ? staff.options[staff.selectedIndex].text.split('（')[0] : "";
        $('calendarTitle').value = (name && entry) ? `${entry}${name}` : "";
        $('closer-label-display').textContent = sName ? `「（クローザー）${sName}」` : "（クローザー）担当者名";
        $('extraQuestion').value = name ? `${name}さんはこれまで副業やったことありますか？` : "";
        
        if (name && date && zoom) {
            $('output').value = `実施日：${date}\n\n${zoom}\n\n【無料プレゼントはこちら👇】\nhttps://forms.gle/i2XPWLVQE44iYc7b8`;
        } else {
            $('output').value = "";
        }
    }

    // 初期化
    initCloserSelect('closer-list', 'unused', refreshFlow);
    initEntrySelect('entry-container', refreshFlow);

    $('lineName').oninput = () => {
        // LINE名が変わったら下の情報をリセット（強制クリア）
        $('meetingDate').value = "";
        const es = getSelect('entry-container'); if(es) es.selectedIndex = 0;
        const cs = getSelect('closer-list'); if(cs) { cs.selectedIndex = 0; cs.style.backgroundColor = "#fff"; }
        refreshFlow();
    };
    
    $('meetingDate').oninput = refreshFlow;
    $('clearBtn').onclick = () => { if(confirm("全て消去します。よろしいですか？")) location.reload(); };

    // コピー
    document.querySelectorAll('.copy-trigger').forEach(btn => {
        btn.onclick = async () => {
            const target = $(btn.dataset.target);
            if (!target.value.trim()) return;
            await navigator.clipboard.writeText(target.value);
            const originalTxt = btn.textContent;
            btn.textContent = "✓ コピー完了！";
            btn.classList.add('copy-done');
            setTimeout(() => {
                btn.textContent = originalTxt;
                btn.classList.remove('copy-done');
            }, 1000);
        };
    });
</script>
</body>
</html>
