<script type="module">
    import { initCloserSelect } from './closer-select.js';
    import { initEntrySelect } from './entry-select.js';

    const lineNameInput = document.getElementById("lineName");
    const meetingDateInput = document.getElementById("meetingDate");
    const calendarTitleInput = document.getElementById("calendarTitle");
    const output = document.getElementById("output");
    const extraQuestion = document.getElementById("extraQuestion");
    const closerLabel = document.getElementById("selected-closer-label");

    // 全初期化（LINE名以外）
    function resetAllExceptLineName() {
        meetingDateInput.value = "";
        calendarTitleInput.value = "";
        output.value = "";
        extraQuestion.value = "";
        closerLabel.textContent = "「（クローザー）担当者名」";
        
        // 担当者プルダウンのリセット
        const staffSelect = document.querySelector('#closer-list select');
        if (staffSelect) {
            staffSelect.selectedIndex = 0;
            staffSelect.style.backgroundColor = "#ffffff";
        }
        
        // 流入経路プルダウンのリセット
        const entrySelect = document.querySelector('#entry-container select');
        if (entrySelect) {
            entrySelect.selectedIndex = 0;
        }
    }

    // カレンダータイトル・メッセージ更新
    function updateAllOutputs() {
        const lineName = lineNameInput.value.trim();
        const meetingDate = meetingDateInput.value.trim();
        
        // 流入経路の取得
        const entrySelect = document.querySelector('#entry-container select');
        const mediaValue = entrySelect ? entrySelect.value : "";
        const entrySelected = entrySelect && entrySelect.selectedIndex > 0;
        
        // 担当者情報の取得
        const staffSelect = document.querySelector('#closer-list select');
        const zoomUrl = staffSelect ? staffSelect.value : "";
        const staffOption = staffSelect ? staffSelect.options[staffSelect.selectedIndex] : null;
        const staffName = (staffOption && staffOption.value) ? staffOption.text.split('（')[0] : "";

        // 1. カレンダータイトル更新（名前と経路が揃った時のみ）
        calendarTitleInput.value = (lineName && entrySelected) ? `${mediaValue}${lineName}` : "";

        // 2. ラベル表示更新
        closerLabel.textContent = staffName ? `「（クローザー）${staffName}」` : "「（クローザー）担当者名」";

        // 3. Zoomメッセージ更新
        if (lineName && meetingDate && zoomUrl) {
            output.value = `実施日：${meetingDate}\n\n${zoomUrl}\n\n【無料プレゼントはこちら👇】\nhttps://forms.gle/i2XPWLVQE44iYc7b8`;
        } else {
            output.value = "";
        }

        // 4. 雑談質問
        extraQuestion.value = lineName ? `${lineName}さんはこれまで副業やったことありますか？` : "";
    }

    // 初期化実行
    initCloserSelect('closer-list', 'unused-id', updateAllOutputs);
    initEntrySelect('entry-container', updateAllOutputs);

    // イベント監視
    lineNameInput.addEventListener("input", () => {
        resetAllExceptLineName();
        updateAllOutputs();
    });

    meetingDateInput.addEventListener("input", updateAllOutputs);

    // クリアボタン
    document.getElementById("clearBtn").addEventListener("click", () => {
        lineNameInput.value = "";
        resetAllExceptLineName();
        updateAllOutputs();
    });

    // コピー機能（省略せずに実装）
    const setupCopy = (btnId, targetEl) => {
        document.getElementById(btnId).onclick = () => {
            if (!targetEl.value) return;
            targetEl.select();
            document.execCommand("copy");
        };
    };
    setupCopy("lineNameCopyBtn", lineNameInput);
    setupCopy("calendarCopyBtn", calendarTitleInput);
    setupCopy("copyBtn", output);
    setupCopy("extraCopyBtn", extraQuestion);

</script>
