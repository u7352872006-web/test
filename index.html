<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>クローザー一覧モーダル</title>
</head>
<body>
  <h2>クローザー選択</h2>

  <label>Zoomリンク:</label>
  <input id="zoom" type="text" readonly style="width:100%; margin-bottom:8px; padding:6px;">

  <button id="showModal">クローザー一覧を表示</button>

  <!-- モーダル -->
  <div id="modal" style="display:none; position:fixed; top:0; left:0; 
      width:100%; height:100%; background: rgba(0,0,0,0.5); 
      justify-content:center; align-items:center;">
    <div style="background:#fff; padding:16px; max-width:600px; width:90%;">
      <h3>クローザー一覧</h3>
      <div id="modalContent"></div>
      <button id="closeModal" style="margin-top:8px;">閉じる</button>
    </div>
  </div>

  <!-- コンポーネントJS -->
  <script type="module" src="closer-modal.js"></script>
</body>
</html>
